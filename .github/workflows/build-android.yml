name: Android APK & AAB Derle

# Bu workflow, Android Studio veya manuel islem GEREKMEDEN,
# push yaptiginizda otomatik olarak APK ve AAB uretir.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}   # "Actions" sekmesinden elle de tetiklenebilir
  release:
    types: [ created ]

permissions:
  contents: write   # Release'e dosya eklemek icin gerekli

jobs:
  build:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al (checkout)
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: NPM bagimliliklarini kur
        run: npm install

      - name: Capacitor Android platformunu ekle (tazece uretilir)
        run: npx cap add android

      - name: Android SDK versiyonlarini garanti altina al (compileSdk hatasi icin)
        run: python3 scripts/ensure-android-sdk.py

      - name: Uygulama ikonu ve splash screen gorsellerini uret
        run: npx capacitor-assets generate --android

      - name: Reklam kimliklerini (AdMob) projeye isle
        run: python3 scripts/patch-ads.py

      - name: Web varliklarini native projeye senkronize et
        run: npx cap sync android

      - name: İmzalama sirlari mevcut mu kontrol et
        id: signing-check
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_ALIAS }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Keystore dosyasini olustur (sirlar mevcutsa)
        if: steps.signing-check.outputs.has_signing == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Android projesini duzenle (izinler, versionCode, imzalama, kucultme)
        env:
          CI_VERSION_CODE: ${{ github.run_number }}
          HAS_SIGNING_SECRETS: ${{ steps.signing-check.outputs.has_signing }}
          CI_KEYSTORE_PATH: release.keystore
          CI_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: python3 scripts/patch-android.py

      - name: DEBUG - build.gradle icerigini goster (sorun cikarsa buradan bakilir)
        run: |
          echo "===== android/variables.gradle ====="
          cat android/variables.gradle
          echo ""
          echo "===== android/app/build.gradle ====="
          cat android/app/build.gradle

      - name: Gradle wrapper'a calistirma izni ver
        run: chmod +x android/gradlew

      - name: Gradle bagimliliklarini onbellekle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: APK derle (assembleRelease)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: AAB derle (bundleRelease - Play Store icin)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Derleme ozetini yazdir
        run: |
          echo "### 📦 Derleme Sonuclari" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.signing-check.outputs.has_signing }}" = "true" ]; then
            echo "✅ **Imzalama:** Gercek release anahtariyla imzalandi." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ **Imzalama:** Sirlar tanimlanmadigi icin debug anahtariyla imzalandi." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- versionCode: \`${{ github.run_number }}\`" >> "$GITHUB_STEP_SUMMARY"
          find android/app/build/outputs/apk/release -name "*.apk" -exec echo "- APK: {}" \; >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          find android/app/build/outputs/bundle/release -name "*.aab" -exec echo "- AAB: {}" \; >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: APK'yi is akisi ciktisi olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: hemsire-rehberi-pro-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: AAB'yi is akisi ciktisi olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: hemsire-rehberi-pro-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Dosyalari GitHub Release'e ekle (yalnizca release olayinda)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
